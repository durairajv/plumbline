# Verifies every commit in a pull request carries a DCO `Signed-off-by` trailer
# matching its author. See CONTRIBUTING.md ("Sign your commits (DCO)").
name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: Check Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR commits
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify DCO sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          commits=$(git rev-list "$BASE_SHA".."$HEAD_SHA")
          if [ -z "$commits" ]; then
            echo "No commits to check."
            exit 0
          fi
          for sha in $commits; do
            author="$(git show -s --format='%an <%ae>' "$sha")"
            subject="$(git show -s --format='%s' "$sha")"
            # Skip merge commits.
            if [ "$(git show -s --format='%P' "$sha" | wc -w)" -gt 1 ]; then
              continue
            fi
            signoffs="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")"
            if printf '%s\n' "$signoffs" | grep -qF "$author"; then
              echo "ok   $sha  $subject"
            else
              echo "FAIL $sha  $subject"
              echo "     missing: Signed-off-by: $author"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more commits are missing a DCO sign-off."
            echo "Fix with:  git rebase --signoff $BASE_SHA  &&  git push --force-with-lease"
            echo "See CONTRIBUTING.md -> 'Sign your commits (DCO)'."
            exit 1
          fi
