name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest
      - name: Naming guardrail (no "Trust Score" in code/output — CLAUDE.md §1.10)
        # Scoped to src/: docs legitimately discuss and forbid the term. The
        # risk is the term leaking into an identifier or user-facing string.
        run: |
          ! grep -rniE "trust[ _-]?score" src
      - name: Dogfood (Plumbline scans its own source with no analyzer errors)
        run: plumb scan src --strict-analyzer-errors
